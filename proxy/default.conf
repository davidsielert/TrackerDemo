upstream tracker_service {
  server tracker:4000;
}

upstream dashboard_site {
  server dashboard:80;
}

upstream demo_sites {
  server sites:80;
}

server {
  listen 80;
  server_name tracker.localhost;

  location / {
    proxy_pass http://tracker_service;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
  }
}

server {
  listen 80;
  server_name dashboard.localhost;

  location / {
    proxy_pass http://dashboard_site;
    proxy_set_header Host $host;
  }
}

server {
  listen 80;
  server_name demo.localhost news.localhost weather.localhost shop.localhost lead-form.localhost;

  location / {
    proxy_pass http://demo_sites;
    proxy_set_header Host $host;
  }
}
