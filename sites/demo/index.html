<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Privacy Tracking Demo Hub</title>
    <style>
      :root {
        color: #172033;
        background: #eef3f8;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * { box-sizing: border-box; }
      body { margin: 0; }
      main { min-height: 100vh; }
      button, a { font: inherit; }
      .deckTop {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 10px 28px;
        border-bottom: 1px solid #d8e1ee;
        background: rgba(248, 251, 255, .94);
        backdrop-filter: blur(10px);
      }
      .brand { display: grid; gap: 1px; }
      .brand strong { font-size: 1.05rem; }
      .brand span { color: #5d6980; font-size: .9rem; }
      .topActions, .navControls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid #cdd8e8;
        border-radius: 8px;
        padding: 9px 12px;
        background: white;
        color: #172033;
        font-weight: 900;
        text-decoration: none;
        cursor: pointer;
      }
      .button.primary { background: #172033; border-color: #172033; color: white; }
      .button.warn { background: #991b1b; border-color: #991b1b; color: white; }
      .button.ghost { background: #f6f9fd; }
      .progressWrap { display: grid; gap: 7px; padding: 14px 28px 0; }
      .progressMeta { display: flex; justify-content: space-between; color: #5d6980; font-weight: 800; font-size: .86rem; }
      .progressBar { height: 8px; overflow: hidden; border-radius: 999px; background: #dce5f2; }
      .progressBar i { display: block; height: 100%; width: 0; border-radius: inherit; background: #2563eb; transition: width .2s ease; }
      .disclaimer {
        display: inline-flex;
        border: 1px solid #bae6fd;
        border-radius: 999px;
        padding: 8px 12px;
        background: #e0f2fe;
        color: #075985;
        font-size: .82rem;
        font-weight: 900;
        text-transform: uppercase;
      }
      .badgeBoard {
        align-self: start;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        padding: 18px;
        border: 1px solid #d8e1ee;
        border-radius: 12px;
        background: white;
      }
      .statusBadge {
        display: grid;
        gap: 4px;
        min-height: 84px;
        border: 1px solid #dfe7f2;
        border-radius: 10px;
        padding: 12px;
        background: #f8fbff;
      }
      .statusBadge b { font-size: .95rem; }
      .statusBadge span { color: #5d6980; font-size: .84rem; line-height: 1.35; }
      .slides {
        max-width: 1320px;
        margin: 0 auto;
        padding: 18px 28px 52px;
      }
      .slide {
        display: none;
        min-height: 520px;
        border: 1px solid #d8e1ee;
        border-radius: 16px;
        padding: 26px 32px;
        background:
          linear-gradient(135deg, rgba(37, 99, 235, .07), rgba(255, 255, 255, 0) 36%),
          white;
        box-shadow: 0 22px 54px rgba(23, 32, 51, .10);
      }
      .slide.active { display: grid; gap: 18px; }
      .slideHead { display: grid; gap: 10px; }
      .slideNumber { color: #2563eb; font-weight: 900; text-transform: uppercase; font-size: .82rem; }
      .slide h2 { margin: 0; font-size: 2.55rem; line-height: 1.04; letter-spacing: 0; }
      .slideLead { max-width: 1050px; color: #4f5d73; font-size: 1.12rem; line-height: 1.45; }
      .overviewIntro {
        display: grid;
        gap: 16px;
        grid-template-columns: minmax(0, .92fr) minmax(320px, 1.08fr);
      }
      .localOnly {
        display: grid;
        gap: 12px;
        align-content: start;
        border: 1px solid #d8e1ee;
        border-radius: 12px;
        padding: 18px;
        background: #f8fbff;
      }
      .localOnly p { margin: 0; color: #536176; line-height: 1.5; }
      .ideaGrid { display: grid; grid-template-columns: minmax(0, 1.05fr) minmax(340px, .95fr); gap: 18px; align-items: stretch; }
      .ideaPanel {
        display: grid;
        gap: 12px;
        border: 1px solid #e0e7f1;
        border-radius: 12px;
        padding: 18px 20px;
        background: rgba(248, 251, 255, .84);
      }
      .ideaPanel h3 { margin: 0; color: #172033; font-size: .96rem; text-transform: uppercase; }
      .ideaList { display: grid; gap: 10px; margin: 0; padding: 0; list-style: none; }
      .ideaList li {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 10px;
        color: #536176;
        line-height: 1.45;
        font-size: .98rem;
      }
      .ideaList li::before {
        content: "";
        width: 10px;
        height: 10px;
        margin-top: .42em;
        border-radius: 999px;
        background: #2563eb;
      }
      .visualPanel {
        display: grid;
        gap: 12px;
        align-content: center;
        border: 1px solid #d8e1ee;
        border-radius: 12px;
        padding: 18px 20px;
        background: white;
      }
      .visualPanel h3 { margin: 0; color: #172033; font-size: .96rem; text-transform: uppercase; }
      .conceptFlow { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
      .conceptNode {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        min-height: 40px;
        border: 1px solid #cdd8e8;
        border-radius: 8px;
        padding: 8px 9px;
        background: #f8fbff;
        color: #172033;
        font-size: .9rem;
        font-weight: 900;
      }
      .conceptArrow { display: none; }
      .takeaway {
        border-left: 5px solid #2563eb;
        border-radius: 8px;
        padding: 13px 16px;
        background: #eff6ff;
        color: #24324a;
        font-size: 1rem;
        line-height: 1.42;
      }
      .takeaway strong { color: #172033; }
      .infoPanel {
        border: 1px solid #e0e7f1;
        border-radius: 12px;
        padding: 18px;
        background: rgba(248, 251, 255, .84);
      }
      .infoPanel h3 { margin: 0 0 8px; font-size: 1rem; text-transform: uppercase; color: #334155; }
      .infoPanel p, .infoPanel li { color: #536176; line-height: 1.5; }
      .infoPanel p { margin: 0; }
      .infoPanel ul { margin: 0; padding-left: 20px; }
      details.infoPanel { padding: 0; overflow: hidden; }
      details.infoPanel summary { cursor: pointer; padding: 13px 16px; font-weight: 900; color: #172033; }
      details.infoPanel div { padding: 0 18px 18px; color: #536176; line-height: 1.5; }
      .notes { border-color: #fed7aa; background: #fff7ed; }
      .notes summary { color: #9a3412; }
      .navFooter {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-top: 4px;
      }
      .slideDots { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
      .slideDots button {
        width: 12px;
        height: 12px;
        border: 0;
        border-radius: 999px;
        padding: 0;
        background: #b8c5d8;
        cursor: pointer;
      }
      .slideDots button.active { width: 28px; background: #2563eb; }
      .toast {
        position: fixed;
        right: 22px;
        bottom: 22px;
        z-index: 50;
        max-width: 360px;
        border-radius: 10px;
        padding: 12px 14px;
        background: #172033;
        color: white;
        font-weight: 800;
        opacity: 0;
        transform: translateY(8px);
        transition: opacity .2s ease, transform .2s ease;
      }
      .toast.visible { opacity: 1; transform: translateY(0); }
      .launcher {
        position: fixed;
        left: 22px;
        right: 22px;
        bottom: 22px;
        z-index: 45;
        display: none;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 14px;
        align-items: center;
        border: 1px solid #cdd8e8;
        border-radius: 12px;
        padding: 14px;
        background: white;
        box-shadow: 0 18px 46px rgba(23, 32, 51, .16);
      }
      .launcher.visible { display: grid; }
      .launcherText { display: grid; gap: 4px; color: #536176; line-height: 1.35; }
      .launcherText strong { color: #172033; }
      .launcherLinks { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      .launcherClose {
        width: 36px;
        height: 36px;
        border: 1px solid #d8e1ee;
        border-radius: 999px;
        background: #f8fbff;
        color: #172033;
        font-weight: 900;
      }
      @media (max-width: 900px) {
        .deckTop, .navFooter { align-items: flex-start; flex-direction: column; }
        .overviewIntro, .ideaGrid { grid-template-columns: 1fr; }
        .slide h2 { font-size: 2rem; }
        .slide { min-height: auto; padding: 22px; }
        .badgeBoard { grid-template-columns: 1fr; }
        .launcher { grid-template-columns: 1fr; }
        .conceptFlow { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="deckTop">
        <div class="brand">
          <strong>Privacy Tracking Demo Hub</strong>
          <span>Local-only presenter deck for cross-context tracking concepts</span>
        </div>
        <div class="topActions">
          <button class="button primary" data-open-dashboard>Open Dashboard</button>
          <button class="button" data-open-all>Open All Demo Sites</button>
          <button class="button warn" data-reset>Reset Demo Data</button>
        </div>
      </header>

      <div class="progressWrap">
        <div class="progressMeta"><span data-progress-label>Slide 1 of 11</span><span>demo.localhost</span></div>
        <div class="progressBar"><i data-progress-bar></i></div>
      </div>

      <section class="slides" aria-live="polite"></section>
    </main>
    <section class="launcher" data-launcher aria-live="polite">
      <div class="launcherText">
        <strong>Demo sites</strong>
        <span data-launcher-message>Use these links if your browser blocks multiple tabs.</span>
      </div>
      <div class="launcherLinks" data-launcher-links></div>
      <button class="launcherClose" data-close-launcher aria-label="Close demo site launcher">x</button>
    </section>
    <div class="toast" data-toast role="status"></div>

    <script>
      const portSuffix = location.port ? `:${location.port}` : "";
      const urls = {
        dashboard: `http://dashboard.localhost${portSuffix}/`,
        demo: `http://demo.localhost${portSuffix}/`,
        news: `http://news.localhost${portSuffix}/`,
        weather: `http://weather.localhost${portSuffix}/`,
        shop: `http://shop.localhost${portSuffix}/`,
        lead: `http://lead-form.localhost${portSuffix}/`,
        tracker: `http://tracker.localhost${portSuffix}`
      };

      const statusBadges = [
        ["JavaScript tracker", "News site sends JSON events."],
        ["Pixel beacon", "Weather site uses a 1x1 image-style request."],
        ["sendBeacon", "Shop site uses browser beacon delivery."],
        ["Fingerprinting", "Fallback reassociation after cookies split or clear."],
        ["Cookie sync", "Local fabricated partner ID mapping."],
        ["Consent blocking", "CMP gate can block behavioral payloads."],
        ["PII risk", "Fake lead form shows risky payload design."]
      ];

      const demoTargets = [
        ["news", "News", urls.news],
        ["weather", "Weather", urls.weather],
        ["shop", "Shop", urls.shop],
        ["lead", "Lead Form", urls.lead]
      ];
      renderLauncherLinks();

      const slides = [
        {
          title: "Cross-context tracking turns scattered visits into a profile",
          explain: "The privacy issue is not one request by itself. It is the ability to connect activity from unrelated contexts into one durable story about a browser or person.",
          overview: true,
          points: [
            "A browser can encounter the same tracker on many unrelated sites.",
            "The tracker receives technical signals, event names, page context, and sometimes form data.",
            "Identity mechanisms decide whether those signals remain separate events or become one profile."
          ],
          visualTitle: "The core pattern",
          visual: ["Site A", "Tracker", "Site B", "Same profile"],
          takeaway: "This local simulation keeps the mechanics visible: transport method, identifier, consent state, and payload content are all inspectable.",
          notes: "Open with scope. Everything is fictional, local-only, and simplified for teaching; no real ad network, Meta/Facebook pixel, analytics vendor, or external service is used."
        },
        {
          title: "A script tag can turn a page view into structured telemetry",
          explain: "JavaScript tags are powerful because they execute in the page, assemble context, and send structured events back to a collection endpoint.",
          points: [
            "The page loads code from the tracker origin.",
            "The code can read browser context and local page state.",
            "A JSON event gives the backend clean fields for analysis and identity matching."
          ],
          visualTitle: "News page signal",
          visual: ["news.localhost", "tracker.js", "JSON event", "Dashboard"],
          takeaway: "Script-based tracking is flexible, which is exactly why tag governance matters.",
          notes: "Use news.localhost as the cleanest example of a conventional JavaScript tracking tag."
        },
        {
          title: "A pixel can hide data collection inside an image request",
          explain: "Pixel beacons are simple: loading a tiny image creates a network request, and query parameters can carry event details to the tracker.",
          points: [
            "The browser treats the request like media, not an application API call.",
            "The URL can still contain event names, page context, identifiers, or form-derived fields.",
            "The response can be a harmless 1x1 image while the server stores the payload."
          ],
          visualTitle: "Beacon mechanics",
          visual: ["Image URL", "Query string", "1x1 GIF", "Stored event"],
          takeaway: "A request does not need to look like an analytics API to behave like tracking.",
          notes: "Weather demonstrates the generic beacon pattern. The lead form later uses a contrived pixel-style request to show PII risk."
        },
        {
          title: "sendBeacon makes background delivery feel invisible",
          explain: "The sendBeacon API is designed for small asynchronous payloads, especially when a page is unloading or the user is moving on.",
          points: [
            "The payload can be delivered without blocking navigation.",
            "The transport looks different, but the backend profile can be the same.",
            "Governance has to inspect the payload, not just the delivery mechanism."
          ],
          visualTitle: "Retail page signal",
          visual: ["shop.localhost", "sendBeacon", "POST body", "Same backend"],
          takeaway: "Different transports can create the same privacy outcome when they feed the same identity system.",
          notes: "Shop helps separate transport mechanics from privacy risk. The risk follows the data and the join key."
        },
        {
          title: "The profile is built by the join key, not by the request style",
          explain: "A script request, an image beacon, and a browser beacon can all become one profile when the tracker can resolve them to the same demo visitor.",
          points: [
            "Cookies are the primary linking mechanism when the browser allows them.",
            "Third-party cookie behavior varies by browser and privacy setting.",
            "Fallback signals can repair split IDs, which is powerful and privacy-sensitive."
          ],
          visualTitle: "One backend profile",
          visual: ["Script", "Pixel", "sendBeacon", "Visitor ID"],
          takeaway: "The dashboard should show one profile receiving all three methods; if it splits, the identity story is broken.",
          notes: "This is the central demo moment. Use the dashboard's Same Profile panel as proof that different request styles can feed one backend profile."
        },
        {
          title: "Fingerprinting is the fallback that makes clearing cookies less final",
          explain: "Fingerprinting is probabilistic. It compares browser characteristics and can reassociate a returning browser after cookies or localStorage are cleared.",
          points: [
            "It can reconnect visits when cookies are missing, partitioned, or changed.",
            "It can be wrong, and the demo labels it as a confidence-based fallback.",
            "Its privacy significance comes from persistence despite user attempts to reset state."
          ],
          visualTitle: "After storage clears",
          visual: ["Cookies cleared", "Browser signals", "Fingerprint match", "ID reissued"],
          takeaway: "Fingerprinting is not magic identity; it is a risky fallback that can undermine user expectations.",
          notes: "Avoid overstating precision. The useful teaching point is persistence and reassociation, not certainty."
        },
        {
          title: "Cookie sync is how separate systems learn they mean the same browser",
          explain: "Cookie sync maps one system's tracker ID to another system's partner ID. This demo fabricates the mapping locally so the concept is visible without any partner system.",
          points: [
            "Each system may have its own pseudonymous identifier.",
            "A sync creates a bridge between those identifiers.",
            "That bridge can expand the reach of a profile across organizations or platforms."
          ],
          visualTitle: "Local fabricated mapping",
          visual: ["Tracker ID", "Sync map", "Partner ID", "Shared meaning"],
          takeaway: "The partner ID in this demo is only a local hash, but the governance question is real: who can join what?",
          notes: "Use this slide to explain the partner ID as a teaching artifact, not as a live third-party integration."
        },
        {
          title: "Consent must gate collection before payloads leave the page",
          explain: "A consent banner is not the control by itself. The control is whether script, beacon, image, and form-derived payloads are blocked until the allowed state exists.",
          points: [
            "CMP enabled means tracking waits for acceptance.",
            "Rejected consent must not send behavioral IDs, page URLs, fingerprints, or PII.",
            "A minimal local audit event can explain that tracking was blocked without becoming behavioral tracking."
          ],
          visualTitle: "Consent gate",
          visual: ["No choice", "Block payload", "Accept", "Allow event"],
          takeaway: "Consent enforcement belongs at the moment data would be sent, not only in the banner UI.",
          notes: "Use the dashboard toggle to show how the same sites behave differently when the CMP gate is enabled."
        },
        {
          title: "PII risk appears when tags receive more than an event name",
          explain: "Pixel-style tags can receive form data when developers intentionally or accidentally include fields in payloads, URL parameters, data layer variables, or matching configurations.",
          points: [
            "Safe mode sends the generic event: LeadSubmitted.",
            "Risky mode adds fake name, email, phone, ZIP, and plan interest to the pixel request.",
            "The dashboard flags those fields as PII and scores the event as high risk."
          ],
          visualTitle: "Lead pixel contrast",
          visual: ["LeadSubmitted", "Add form fields", "Pixel URL", "PII flagged"],
          takeaway: "The privacy failure is not that a pixel exists; it is that sensitive fields are allowed into the tag payload.",
          notes: "Use only the fake sample values. The demo is local-only and intentionally contrived to make payload review concrete."
        },
        {
          title: "Governance means seeing payloads, consent, identity, and partners together",
          explain: "A privacy review cannot stop at tag inventory. It needs evidence of what is sent, when it is sent, how it is linked, and who can interpret the identifiers.",
          points: [
            "Payload review catches unexpected fields and PII leakage.",
            "Consent testing verifies blocked states, not just banner presence.",
            "Identity review explains how events become profiles across contexts."
          ],
          visualTitle: "Governance lens",
          visual: ["Payload", "Consent", "Identity", "Partner map"],
          takeaway: "The dashboard is a governance model: inspect the data flow, then decide what should be allowed.",
          notes: "Tie the demo back to operating practice: tag approval, data layer review, consent QA, monitoring, and escalation paths."
        },
        {
          title: "The practical question is simple: what left the page, and what can it be joined to?",
          explain: "Tracking risk comes from payload content, recipient, consent state, and identity linkage. The mechanisms differ, but the governance questions stay consistent.",
          points: [
            "Transport method does not determine risk by itself.",
            "Identifiers and partner mappings decide whether events become durable profiles.",
            "Consent enforcement and payload review are the controls that make the system governable."
          ],
          visualTitle: "Final mental model",
          visual: ["Payload", "Recipient", "Join key", "Risk"],
          takeaway: "A good privacy review follows the data from page to backend profile, then asks whether each join and field is justified.",
          notes: "Close by resetting the demo data if another presenter will use the environment."
        }
      ];

      const slidesHost = document.querySelector(".slides");
      const progressLabel = document.querySelector("[data-progress-label]");
      const progressBar = document.querySelector("[data-progress-bar]");
      let currentSlide = Number(new URLSearchParams(location.search).get("slide") || 1) - 1;
      currentSlide = Math.min(Math.max(currentSlide, 0), slides.length - 1);

      function renderSlides() {
        slidesHost.innerHTML = slides.map((slide, index) => `
          <article class="slide" data-slide="${index}">
            <div class="slideHead">
              <span class="slideNumber">Section ${index + 1} of ${slides.length}</span>
              <h2>${slide.title}</h2>
              <p class="slideLead">${slide.explain}</p>
            </div>
            ${slide.overview ? `
              <div class="overviewIntro">
                <section class="localOnly">
                  <span class="disclaimer">Educational simulation only</span>
                  <p>This presenter deck uses fictional sites, fake identifiers, fake form data, and localhost-only services. No real ad network, Meta/Facebook pixel, analytics vendor, or external request is used.</p>
                </section>
                <div class="badgeBoard" aria-label="Demo capabilities">
                  ${statusBadges.map(([title, body]) => `<div class="statusBadge"><b>${title}</b><span>${body}</span></div>`).join("")}
                </div>
              </div>
            ` : ""}
            <div class="ideaGrid">
              <section class="ideaPanel">
                <h3>Key Ideas</h3>
                <ul class="ideaList">${slide.points.map((item) => `<li>${item}</li>`).join("")}</ul>
              </section>
              <section class="visualPanel">
                <h3>${slide.visualTitle}</h3>
                <div class="conceptFlow">
                  ${slide.visual.map((item, itemIndex) => `
                    <span class="conceptNode">${item}</span>
                    ${itemIndex < slide.visual.length - 1 ? `<span class="conceptArrow">&rarr;</span>` : ""}
                  `).join("")}
                </div>
              </section>
            </div>
            <div class="takeaway"><strong>Takeaway:</strong> ${slide.takeaway}</div>
            <details class="infoPanel notes">
              <summary>Speaker Notes</summary>
              <div>${slide.notes}</div>
            </details>
            <footer class="navFooter">
              <div class="navControls">
                <button class="button ghost" data-prev>Previous</button>
                <button class="button ghost" data-next>Next</button>
              </div>
              <div class="slideDots" aria-label="Slide navigation">
                ${slides.map((_, dotIndex) => `<button aria-label="Go to section ${dotIndex + 1}" data-dot="${dotIndex}"></button>`).join("")}
              </div>
            </footer>
          </article>
        `).join("");
        showSlide(currentSlide);
      }

      function showSlide(index) {
        currentSlide = Math.min(Math.max(index, 0), slides.length - 1);
        document.querySelectorAll(".slide").forEach((slide, slideIndex) => {
          slide.classList.toggle("active", slideIndex === currentSlide);
        });
        document.querySelectorAll("[data-dot]").forEach((dot) => {
          dot.classList.toggle("active", Number(dot.dataset.dot) === currentSlide);
        });
        progressLabel.textContent = `Slide ${currentSlide + 1} of ${slides.length}`;
        progressBar.style.width = `${((currentSlide + 1) / slides.length) * 100}%`;
        history.replaceState(null, "", `?slide=${currentSlide + 1}`);
      }

      function openAll() {
        showLauncher("Opening demo sites. If a popup blocker interferes, use these direct links.");
        const blocked = [];
        demoTargets.forEach(([key, label, url]) => {
          const tab = window.open(url, `privacy_training_${key}`);
          if (!tab) {
            blocked.push(label);
            return;
          }
        });
        if (blocked.length > 0) {
          showToast(`Popup blocker stopped: ${blocked.join(", ")}.`);
        } else {
          showToast("Opened all demo sites in named tabs.");
        }
      }

      function renderLauncherLinks() {
        const launcherLinks = document.querySelector("[data-launcher-links]");
        launcherLinks.innerHTML = demoTargets.map(([key, label, url]) => (
          `<a class="button primary" href="${url}" target="privacy_training_${key}" rel="noopener">${label}</a>`
        )).join("");
      }

      function showLauncher(message) {
        document.querySelector("[data-launcher-message]").textContent = message;
        document.querySelector("[data-launcher]").classList.add("visible");
      }

      function hideLauncher() {
        document.querySelector("[data-launcher]").classList.remove("visible");
      }

      async function resetDemo() {
        try {
          await fetch(`${urls.tracker}/api/events`, { method: "DELETE" });
          await fetch(`${urls.tracker}/api/config`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ cmpEnabled: false })
          });
          showToast("Demo data reset. CMP gate is disabled.");
        } catch (error) {
          showToast("Reset failed. Check that tracker.localhost is running.");
        }
      }

      let toastTimer;
      function showToast(message) {
        const toast = document.querySelector("[data-toast]");
        toast.textContent = message;
        toast.classList.add("visible");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove("visible"), 2600);
      }

      document.addEventListener("click", (event) => {
        const target = event.target.closest("button");
        if (!target) return;
        if (target.matches("[data-prev]")) showSlide(currentSlide - 1);
        if (target.matches("[data-next]")) showSlide(currentSlide + 1);
        if (target.matches("[data-dot]")) showSlide(Number(target.dataset.dot));
        if (target.matches("[data-open-all]")) openAll();
        if (target.matches("[data-open-dashboard]")) window.open(urls.dashboard, "_blank", "noreferrer");
        if (target.matches("[data-reset]")) resetDemo();
        if (target.matches("[data-close-launcher]")) hideLauncher();
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "ArrowRight") showSlide(currentSlide + 1);
        if (event.key === "ArrowLeft") showSlide(currentSlide - 1);
      });

      renderSlides();
    </script>
  </body>
</html>
