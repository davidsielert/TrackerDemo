server {
  listen 80;
  server_name demo.localhost;
  root /usr/share/nginx/html/demo;
  index index.html;

  location = /shared.css { alias /usr/share/nginx/html/shared.css; }
  location /assets/ { alias /usr/share/nginx/html/assets/; }
  location / { try_files $uri /index.html; }
}

