services:
  proxy:
    image: nginx:1.27-alpine
    ports:
      - "${HOST_HTTP_PORT:-80}:80"
    volumes:
      - ./proxy/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - tracker
      - dashboard
      - sites

  tracker:
    build: ./tracker
    environment:
      DB_PATH: /data/tracker-demo.sqlite
      STRICT_CONSENT_MODE: ${STRICT_CONSENT_MODE:-true}
      CMP_ENABLED: ${CMP_ENABLED:-false}
      PORT: 4000
    volumes:
      - tracker-data:/data
    expose:
      - "4000"

  dashboard:
    build: ./dashboard
    expose:
      - "80"

  sites:
    image: nginx:1.27-alpine
    volumes:
      - ./sites:/usr/share/nginx/html:ro
      - ./sites/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"

volumes:
  tracker-data:
